<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ILU GREEN DAY - RSVP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-b from-green-50 to-green-100 min-h-screen flex items-center justify-center py-10 px-4">

  <div class="max-w-lg w-full bg-white rounded-2xl shadow-xl overflow-hidden">

    <div class="bg-green-700 text-white py-8 px-6 text-center">
      <h1 class="text-3xl md:text-4xl font-bold">ILU GREEN DAY</h1>
      <p class="mt-2 text-green-100">Leading through Environmental Stewardship</p>
      <p class="mt-3 text-sm md:text-base">
        6th March 2026 | 8:00 AM - 4:00 PM<br>
        ILU Kitengela Campus
      </p>
    </div>

    <form id="rsvpForm" class="p-6 md:p-8 space-y-6">
      <div>
        <label for="fullname" class="block text-sm font-medium text-gray-700">Full Name *</label>
        <input type="text" id="fullname" name="fullname" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 px-4 py-3">
      </div>

      <div>
        <label for="contact" class="block text-sm font-medium text-gray-700">Phone or Email *</label>
        <input type="text" id="contact" name="contact" required placeholder="e.g. +2547xxx or name@example.com" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 px-4 py-3">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Will you be attending? *</label>
        <div class="flex flex-wrap gap-6">
          <label class="flex items-center">
            <input type="radio" name="attending" value="Yes" required class="h-5 w-5 text-green-600 focus:ring-green-500">
            <span class="ml-2 text-gray-700">Yes</span>
          </label>
          <label class="flex items-center">
            <input type="radio" name="attending" value="No" class="h-5 w-5 text-green-600 focus:ring-green-500">
            <span class="ml-2 text-gray-700">No</span>
          </label>
          <label class="flex items-center">
            <input type="radio" name="attending" value="Maybe" class="h-5 w-5 text-green-600 focus:ring-green-500">
            <span class="ml-2 text-gray-700">Maybe</span>
          </label>
        </div>
      </div>

      <div>
        <label for="numpeople" class="block text-sm font-medium text-gray-700">Number of People (including yourself) *</label>
        <input type="number" id="numpeople" name="numpeople" min="1" required value="1" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 px-4 py-3">
      </div>

      <div>
        <label for="comments" class="block text-sm font-medium text-gray-700">Comments / Special Notes (optional)</label>
        <textarea id="comments" name="comments" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 px-4 py-3"></textarea>
      </div>

      <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-lg transition duration-300 text-lg">
        Submit RSVP
      </button>
    </form>

    <div id="response" class="px-8 pb-6 text-center font-medium"></div>

  </div>

  <script>
    document.getElementById("rsvpForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const responseDiv = document.getElementById("response");
      responseDiv.innerHTML = "<p class='text-green-600'>Submitting your RSVP...</p>";

      const formData = new FormData(this);

      try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbxTrem6Pqoxyl-lhGpKkl1qJJQTHsFZm0IEmppv_WSn7XuvCO0X-vlCUmw3SJvpNnQA/exec", {
          method: "POST",
          body: formData
        });
        const data = await res.json();

        if (data.status === "success") {
          responseDiv.innerHTML = "<p class='text-green-700 font-bold'>Thank you! Your RSVP is confirmed 🌱</p><p class='text-gray-600 mt-2'>We'll see you on March 6th!</p>";
          this.reset();
        } else {
          responseDiv.innerHTML = "<p class='text-red-600'>Sorry, an error occurred. Please try again.</p>";
        }
      } catch (err) {
        responseDiv.innerHTML = "<p class='text-red-600'>Connection issue — check your internet and try again.</p>";
      }
    });
  </script>

</body>
</html>
